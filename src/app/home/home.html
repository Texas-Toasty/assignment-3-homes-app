<section class="content">
  <form>
    <input
      class="form-control min d-inline-block m-3"
      type="text"
      placeholder="Filter by city"
      aria-label="Filter by city"
      style="width: 30%"
      #filter
    />
    <button type="button" class="btn btn-primary" (click)="filterResults(filter.value)">
      Search
    </button>
    <div class="results">
      <app-housing-location
        *ngFor="let location of filteredLocationList"
        [housingLocation]="location"
      ></app-housing-location>
    </div>
  </form>
</section>
